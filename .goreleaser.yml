version: 2

builds:
  - id: zone
    main: .
    binary: zone
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: zone
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: zone
    ids:
      - zone
    repository:
      owner: peasant-labs
      name: homebrew-tap
    homepage: "https://github.com/peasant-labs/zone"
    description: "Sandboxed Docker workspaces for LLM coding agents"
    license: "MIT"

release:
  github:
    owner: peasant-labs
    name: zone
